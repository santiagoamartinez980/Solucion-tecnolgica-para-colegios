<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduTech Nexus · Plataforma de Cursos TIC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="lms-container">
        <!-- Cabecera institucional -->
        <header class="lms-header">
            <div class="header-title">
                <h1>📘 UNIVERSIDAD DE CUNDINAMARCA</h1>
                <p>Plataforma de apoyo en conocimiento · TIC, IA, Robótica y más</p>
            </div>
            <div class="progress-area">
                <span class="progress-label">Progreso general</span>
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="globalProgress" style="width: 0%;"></div>
                </div>
                <span id="progressPercent" class="progress-percent">0%</span>
            </div>
        </header>

        <!-- Grilla de tarjetas (cards) con los 6 módulos -->
        <div class="cards-grid" id="cardsGrid">
            <!-- Las 6 cards se generarán dinámicamente con JS para mantener el código limpio,
                pero las escribo directamente para que sea autocontenido y fácil de editar -->
        </div>
    </div>

    <!-- Modal para mostrar el video + cuestionario -->
    <div id="modalLeccion" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="modalTitulo">Título del módulo</h2>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="video-wrapper">
                    <iframe id="videoFrame" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="quiz-section" id="quizSection">
                    <h3>📝 Cuestionario (5 preguntas)</h3>
                    <div id="preguntasContainer"></div>
                    <button id="submitQuizBtn" class="btn-submit">✅ Verificar respuestas</button>
                    <div id="quizFeedback" class="quiz-feedback"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
